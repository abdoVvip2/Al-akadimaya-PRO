<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة التلاميذ - كناشي Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc; --white: #ffffff;
            --blue: #2563eb; --green: #22c55e;
            --red: #ef4444; --orange: #f97316;
            --slate: #64748b; --dark: #0f172a;
            --radius: 18px;
        }

        * { font-variant-numeric: lining-nums; font-feature-settings: "lnum" 1; box-sizing: border-box; }

        body {
            font-family: 'Cairo', "Segoe UI", sans-serif;
            background: var(--bg); margin: 0; padding: 15px;
            color: var(--dark); line-height: 1.5;
        }
        .app-wrapper { width: 100%; max-width: 460px; margin: 0 auto; padding-bottom: 110px; }

        /* ── top nav ── */
        .top-nav { display: flex; align-items: center; margin-bottom: 16px; gap: 14px; }
        .back-link {
            background: var(--white); border: none; width: 44px; height: 44px;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: var(--dark);
            text-decoration: none; transition: 0.15s;
        }
        .back-link:active { transform: scale(0.9); }
        .top-nav h2 { margin: 0; font-size: 1.3rem; font-weight: 900; }

        /* ── search ── */
        .search-bar {
            background: var(--white); border-radius: 14px;
            padding: 11px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px; border: 1px solid #e8edf5;
        }
        .search-bar input {
            flex: 1; border: none; outline: none;
            font-size: 1rem; background: transparent;
            font-family: 'Cairo', inherit; color: var(--dark);
        }
        .search-bar i { color: var(--slate); }

        /* ── student card ── */
        .student-card {
            background: var(--white); padding: 18px 20px;
            border-radius: var(--radius); margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e8edf5;
            position: relative; overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .student-card::before {
            content: ''; position: absolute;
            top: 0; right: 0; width: 4px; height: 100%;
            background: var(--green);
        }
        .student-card.has-debt::before { background: var(--red); }

        .info h4 { margin: 0; font-size: 1.1rem; font-weight: 900; }
        .info p  { margin: 6px 0 0; font-size: 0.88rem; color: var(--slate); display: flex; align-items: center; gap: 7px; }

        .debt-status {
            margin-top: 10px; display: inline-flex; align-items: center;
            padding: 4px 12px; border-radius: 20px; font-size: 0.82rem; font-weight: 700;
        }
        .status-danger  { background: #fee2e2; color: #b91c1c; }
        .status-success { background: #dcfce7; color: #15803d; }

        .action-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(44px, 1fr));
            gap: 9px; margin-top: 16px;
            border-top: 1px solid #f1f5f9; padding-top: 14px;
        }
        .btn-op {
            height: 48px; border: none; border-radius: 13px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem;
            transition: all 0.15s; text-decoration: none;
        }
        .btn-op:active { transform: translateY(2px); opacity: 0.8; }
        .btn-wa { background: #e8faf0; color: #16a34a; }
        .btn-ph { background: #eff6ff; color: #2563eb; }
        .btn-ar { background: #fff7ed; color: #c2410c; }
        .btn-ed { background: #f8fafc; color: #475569; border: 1px solid #f1f5f9; }
        .btn-dl { background: #fef2f2; color: #dc2626; }

        /* ── FAB ── */
        .fab {
            position: fixed; bottom: 28px; left: 24px;
            width: 62px; height: 62px;
            background: var(--blue); color: white;
            border-radius: 20px; border: none; font-size: 24px;
            box-shadow: 0 10px 24px rgba(37,99,235,0.4);
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .fab:active { transform: scale(0.88) rotate(90deg); }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(15,23,42,0.75); z-index: 2000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(6px);
        }
        .modal-content {
            background: white; padding: 28px;
            border-radius: 26px; width: 92%; max-width: 390px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            animation: mIn 0.2s ease;
        }
        @keyframes mIn {
            from { opacity:0; transform:translateY(18px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .modal-content h3 { margin: 0 0 18px; text-align: center; font-size: 1.2rem; font-weight: 900; }

        .inp {
            width: 100%; padding: 13px 15px; margin-bottom: 12px;
            border: 2px solid #e8edf5; border-radius: 13px;
            font-size: 0.97rem; outline: none;
            transition: border-color 0.15s;
            font-family: 'Cairo', inherit;
        }
        .inp:focus { border-color: var(--blue); }

        .btn-submit {
            background: var(--blue); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 14px;
            font-weight: 800; cursor: pointer; margin-top: 6px;
            font-size: 1rem; font-family: 'Cairo', inherit;
            box-shadow: 0 4px 12px rgba(37,99,235,0.25);
        }

        .btn-cancel {
            width: 100%; background: none; border: none;
            margin-top: 12px; color: var(--slate); cursor: pointer;
            font-family: 'Cairo', inherit; font-size: 0.97rem;
            padding: 8px; border-radius: 10px;
        }

        /* ── مودال عرض تفاصيل التلميذ ── */
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        .info-row span { color: var(--slate); font-weight: 600; }
        .info-row b { color: var(--dark); font-weight: 700; }

        .loading { text-align: center; padding: 40px; color: var(--slate); font-weight: 600; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="top-nav">
        <a href="home.html" class="back-link"><i class="fas fa-chevron-right"></i></a>
        <h2>قائمة التلاميذ</h2>
    </div>

    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="ابحث عن تلميذ بالتطابق المباشر..." oninput="window.searchStudents()">
    </div>

    <div id="list"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل بيانات التلاميذ...</div></div>
</div>

<button class="fab" onclick="window.openModal()"><i class="fas fa-plus"></i></button>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">إضافة تلميذ جديد</h3>
        <input type="hidden" id="editId">
        <input type="text"   id="name"  class="inp" placeholder="الاسم الكامل للتلميذ">
        <input type="number" id="phone" class="inp" placeholder="رقم هاتف ولي الأمر">
        <select id="group" class="inp"></select>
        
        <input type="hidden" id="debt" value="0">

        <button class="btn-submit" id="saveBtn" onclick="window.save()">💾 حفظ البيانات</button>
        <button class="btn-cancel" onclick="window.closeModal()">إلغاء</button>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <h3>بطاقة بيانات التلميذ</h3>
        <div class="info-row"><span>الاسم الكامل:</span> <b id="det-name">—</b></div>
        <div class="info-row"><span>الفوج:</span> <b id="det-group">—</b></div>
        <div class="info-row"><span>رقم الهاتف:</span> <b id="det-phone">—</b></div>
        <div class="info-row"><span>تاريخ الانضمام:</span> <b id="det-date">—</b></div>
        <div class="info-row"><span>حالة الحساب المالي:</span> <b id="det-debt">—</b></div>
        <button class="btn-submit" style="background: var(--slate);" onclick="window.closeDetailModal()">إغلاق النافذة</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // بقاء مفاتيح الربط آمن وضروري داخلياً، والواجهة لن تظهر أي مسمى خارجي للمستخدم
    const firebaseConfig = {
        apiKey: "AIzaSyCIEXF3UK4IO5L8RIbmosLsc65ayNupkX4",
        authDomain: "molakasati.firebaseapp.com",
        databaseURL: "https://molakasati-default-rtdb.firebaseio.com",
        projectId: "molakasati",
        storageBucket: "molakasati.firebasestorage.app",
        messagingSenderId: "981780224226",
        appId: "1:981780224226:web:6565de586fffa9f33326bb",
        measurementId: "G-H52ZV49J1C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let localStudentsArray = [];

    function fmtMoney(v) { return Number(v || 0).toLocaleString('en-US') + ' دج'; }

    async function loadGroupsDropdown(selectedGroup = "") {
        const selectEl = document.getElementById("group");
        selectEl.innerHTML = '<option value="غير مححدد">اختر الفوج الدراسي</option>';
        try {
            const querySnapshot = await getDocs(collection(db, "groups"));
            querySnapshot.forEach((doc) => {
                const groupName = doc.data().name || doc.id;
                const opt = document.createElement("option");
                opt.value = groupName;
                opt.textContent = groupName;
                if (groupName === selectedGroup) opt.selected = true;
                selectEl.appendChild(opt);
            });
        } catch (error) {
            console.error("Error loading groups:", error);
            ["فوج A", "فوج B", "فوج C"].forEach(g => {
                const opt = document.createElement("option");
                opt.value = g; opt.textContent = g;
                if (g === selectedGroup) opt.selected = true;
                selectEl.appendChild(opt);
            });
        }
    }

    async function fetchAndRenderStudents() {
        const container = document.getElementById("list");
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> جارٍ جلب البيانات الحية...</div>';
        
        try {
            const querySnapshot = await getDocs(collection(db, "students"));
            localStudentsArray = [];
            
            querySnapshot.forEach((doc) => {
                localStudentsArray.push({ id: doc.id, ...doc.data() });
            });

            window.renderList(localStudentsArray);
        } catch (error) {
            console.error("Loading error:", error);
            container.innerHTML = `<div class="loading" style="color:var(--red);">فشل الاتصال بالنظام الخارجي. تأكد من إعدادات الصلاحيات وقواعد الوصول للبيانات.</div>`;
        }
    }

    window.renderList = function(students) {
        const container = document.getElementById("list");
        if (!students.length) {
            container.innerHTML = `
                <div style="text-align:center; padding:70px 20px;">
                    <i class="fas fa-user-slash" style="font-size:3.5rem; color:#cbd5e1; margin-bottom:14px; display:block;"></i>
                    <p style="color:var(--slate); font-weight:600;">لا يوجد تلاميذ متطابقين حالياً</p>
                </div>`;
            return;
        }

        const sorted = [...students].sort((a, b) => (Number(b.debt || 0)) - (Number(a.debt || 0)));

        container.innerHTML = sorted.map(s => {
            const currentDebt = Number(s.debt || 0);
            const isDebt = currentDebt > 0;
            return `
            <div class="student-card ${isDebt ? 'has-debt' : ''}">
                <div class="info">
                    <h4>${s.name}</h4>
                    <p><i class="fas fa-users"></i> ${s.group || 'غير محدد'}</p>
                    <div class="debt-status ${isDebt ? 'status-danger' : 'status-success'}">
                        ${isDebt ? `دين معلّق: ${fmtMoney(currentDebt)}` : 'الحساب خالص وخالٍ من الديون ✓'}
                    </div>
                </div>
                <div class="action-grid">
                    ${s.phone ? `
                        <a href="https://wa.me/${s.phone}" class="btn-op btn-wa" target="_blank" title="واتساب ولي الأمر"><i class="fab fa-whatsapp"></i></a>
                        <a href="tel:${s.phone}" class="btn-op btn-ph" title="اتصال مباشر"><i class="fas fa-phone-alt"></i></a>` : ''}
                    <button class="btn-op btn-ar" onclick="window.openDetailModal('${s.id}')" title="عرض تفاصيل التلميذ كاملة"><i class="fas fa-id-card"></i></button>
                    <button class="btn-op btn-ed" onclick="window.openModal('${s.id}')" title="تعديل البيانات"><i class="fas fa-user-edit"></i></button>
                    <button class="btn-op btn-dl" onclick="window.removeStudent('${s.id}')" title="حذف نهائي"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>`;
        }).join("");
    }

    window.searchStudents = function() {
        const term = document.getElementById("search-input").value.toLowerCase().trim();
        if (!term) {
            window.renderList(localStudentsArray);
            return;
        }
        const filtered = localStudentsArray.filter(s => s.name && s.name.toLowerCase().includes(term));
        window.renderList(filtered);
    }

    window.openModal = async function(id = null) {
        document.getElementById("modal").style.display = "flex";
        if (id) {
            document.getElementById("modalTitle").innerText = "تعديل بيانات التلميذ";
            document.getElementById("editId").value = id;
            
            const docRef = doc(db, "students", id);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const s = docSnap.data();
                document.getElementById("name").value = s.name || "";
                document.getElementById("phone").value = s.phone || "";
                document.getElementById("debt").value = s.debt || "0";
                await loadGroupsDropdown(s.group);
            }
        } else {
            document.getElementById("modalTitle").innerText = "إضافة تلميذ جديد";
            document.getElementById("editId").value = "";
            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("debt").value = "0";
            await loadGroupsDropdown();
        }
    }

    window.closeModal = function() { document.getElementById("modal").style.display = "none"; }

    window.save = async function() {
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const group = document.getElementById("group").value;
        const debt = Number(document.getElementById("debt").value || 0);
        const editId = document.getElementById("editId").value;
        const saveBtn = document.getElementById("saveBtn");

        if (!name) { alert("الاسم الكامل حقل إجباري لا يمكن تركه فارغاً!"); return; }

        saveBtn.disabled = true;
        saveBtn.innerText = "جاري الحفظ والرفع للنظام...";

        try {
            if (editId) {
                const docRef = doc(db, "students", editId);
                await updateDoc(docRef, {
                    name: name,
                    phone: phone,
                    group: group,
                    debt: debt
                });
            } else {
                await addDoc(collection(db, "students"), {
                    name: name,
                    phone: phone,
                    group: group,
                    debt: debt,
                    registeredAt: serverTimestamp()
                });
            }
            window.closeModal();
            fetchAndRenderStudents();
        } catch (error) {
            console.error("Error saving document: ", error);
            alert("حدث خطأ أثناء الاتصال بالخادم وحفظ البيانات.");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "💾 حفظ البيانات";
        }
    }

    window.removeStudent = async function(id) {
        if (confirm("هل أنت متأكد من رغبتك في حذف هذا التلميذ نهائياً من النظام؟")) {
            try {
                await deleteDoc(doc(db, "students", id));
                fetchAndRenderStudents();
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert("لم تتم العملية بالشكل الصحيح، تفقد قواعد الصلاحيات لديك.");
            }
        }
    }

    window.openDetailModal = async function(id) {
        const docRef = doc(db, "students", id);
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) {
            const s = docSnap.data();
            document.getElementById("det-name").innerText = s.name || "—";
            document.getElementById("det-group").innerText = s.group || "غير محدد";
            document.getElementById("det-phone").innerText = s.phone || "لا يوجد رقم هاتف متاح";
            document.getElementById("det-debt").innerText = fmtMoney(s.debt);

            if (s.registeredAt && s.registeredAt.seconds) {
                const jsDate = new Date(s.registeredAt.seconds * 1000);
                document.getElementById("det-date").innerText = jsDate.toLocaleDateString("ar-DZ", {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
            } else {
                document.getElementById("det-date").innerText = "مضاف قديماً أو غير محدد";
            }

            document.getElementById("detail-modal").style.display = "flex";
        }
    }

    window.closeDetailModal = function() { document.getElementById("detail-modal").style.display = "none"; }

    fetchAndRenderStudents();
</script>
</body>
</html>
