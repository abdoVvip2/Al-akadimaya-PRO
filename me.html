<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز المعالي Pro — اللوحة الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a56db;
            --blue-deep: #1043b0;
            --blue-light: #eff6ff;
            --purple: #7c3aed;
            --purple-light: #f5f3ff;
            --orange: #d97706;
            --orange-light: #fffbeb;
            --green: #059669;
            --green-light: #ecfdf5;
            --teal: #0891b2;
            --teal-light: #ecfeff;
            --red: #dc2626;
            --red-light: #fef2f2;
            --text: #0d1b3e;
            --text-mid: #334155;
            --muted: #64748b;
            --border: #e2e8f0;
            --bg: #f0f4fc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(26,86,219,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* ── Blobs ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #bfdbfe, #93c5fd);
            top: -150px; right: -100px;
            animation: floatB 9s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #ddd6fe, #c4b5fd);
            bottom: -100px; left: -80px;
            animation: floatB 11s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatB {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(25px,18px) scale(1.07); }
        }

        /* ── Wrapper ── */
        #appContainer {
            display: none;
            max-width: 430px;
            margin: 0 auto;
            padding: 0 0 40px 0;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Hero Header ── */
        .hero {
            background: linear-gradient(145deg, var(--blue-deep) 0%, var(--blue) 55%, #3b82f6 100%);
            padding: 36px 24px 80px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            top: -120px; left: -60px;
        }
        .hero::after {
            content: '';
            position: absolute;
            width: 180px; height: 180px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            bottom: -60px; right: 20px;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative; z-index: 2;
        }
        .brand-mark {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.18);
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
        }
        .brand-icon i { color: white; font-size: 1.1rem; }
        .brand-name {
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.3px;
        }
        .brand-name small {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            color: rgba(255,255,255,0.65);
            margin-top: -2px;
        }

        .date-chip {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .hero-welcome {
            position: relative; z-index: 2;
            margin-top: 24px;
        }
        .hero-welcome p {
            color: rgba(255,255,255,0.75);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .hero-welcome h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        #roleBadgeSlot { margin-top: 10px; }
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .badge-admin {
            background: rgba(220,38,38,0.18);
            color: #fca5a5;
            border: 1px solid rgba(252,165,165,0.3);
        }
        .badge-manager {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* ── Floating Cards Container ── */
        .cards-wrap {
            padding: 0 16px;
            margin-top: -48px;
            position: relative; z-index: 10;
        }

        /* ── Section title ── */
        .section-title {
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 22px 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-item {
            background: var(--white);
            padding: 22px 12px 18px;
            border-radius: 22px;
            text-align: center;
            text-decoration: none;
            border: 1.5px solid rgba(226,232,240,0.7);
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .grid-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.5), transparent);
            border-radius: inherit;
            pointer-events: none;
        }
        .grid-item:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(26,86,219,0.12); }
        .grid-item:active { transform: scale(0.96); }

        .icon-wrap {
            width: 54px; height: 54px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.35rem;
            position: relative;
        }
        .icon-wrap::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            opacity: 0.3;
        }

        .grid-item span {
            font-weight: 800;
            font-size: 0.87rem;
            color: var(--text-mid);
            display: block;
            line-height: 1.3;
        }

        /* Colors */
        .item-blue   .icon-wrap { background: var(--blue-light);   color: var(--blue); }
        .item-purple .icon-wrap { background: var(--purple-light);  color: var(--purple); }
        .item-orange .icon-wrap { background: var(--orange-light);  color: var(--orange); }
        .item-green  .icon-wrap { background: var(--green-light);   color: var(--green); }
        .item-teal   .icon-wrap { background: var(--teal-light);    color: var(--teal); }
        .item-red    .icon-wrap { background: var(--red-light);     color: var(--red); }

        /* Stagger animation */
        .grid-item { animation: itemIn 0.4s ease both; }
        .grid-item:nth-child(1) { animation-delay: 0.05s; }
        .grid-item:nth-child(2) { animation-delay: 0.10s; }
        .grid-item:nth-child(3) { animation-delay: 0.15s; }
        .grid-item:nth-child(4) { animation-delay: 0.20s; }
        .grid-item:nth-child(5) { animation-delay: 0.25s; }
        .grid-item:nth-child(6) { animation-delay: 0.30s; }
        @keyframes itemIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Locked ── */
        .grid-item.locked {
            opacity: 0.42;
            cursor: not-allowed;
            pointer-events: none;
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .grid-item.locked .icon-wrap {
            background: #e2e8f0 !important;
            color: #94a3b8 !important;
        }
        .lock-icon {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--red-light);
            color: var(--red);
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            border: 1px solid #fca5a5;
        }

        /* ── Logout ── */
        .logout-btn {
            width: calc(100% - 32px);
            margin: 24px 16px 0;
            padding: 14px;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            color: var(--red);
            font-family: 'Cairo', sans-serif;
            font-size: 0.92rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.15s;
            box-shadow: var(--shadow);
        }
        .logout-btn:hover { background: var(--red-light); transform: translateY(-1px); }
        .logout-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div id="appContainer">

    <!-- Hero -->
    <div class="hero">
        <div class="hero-top">
            <div class="brand-mark">
                <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="brand-name">
                    مركز المعالي
                    <small>Pro — لوحة التحكم</small>
                </div>
            </div>
            <div class="date-chip" id="liveDate"></div>
        </div>
        <div class="hero-welcome">
            <p>👋 أهلاً وسهلاً</p>
            <h2 id="welcomeText">مرحباً بك</h2>
            <div id="roleBadgeSlot"></div>
        </div>
    </div>

    <!-- Cards -->
    <div class="cards-wrap">

        <div class="section-title"><i class="fas fa-th-large"></i> الأقسام الرئيسية</div>

        <div class="grid">

            <a href="add_students.html" class="grid-item item-blue" id="btn-students">
                <div class="icon-wrap"><i class="fas fa-user-plus"></i></div>
                <span>التلاميذ</span>
            </a>

            <a href="add_teachers.html" class="grid-item item-purple" id="btn-teachers">
                <div class="icon-wrap"><i class="fas fa-chalkboard-teacher"></i></div>
                <span>الأساتذة</span>
            </a>

            <a href="add_groups.html" class="grid-item item-orange" id="btn-groups">
                <div class="icon-wrap"><i class="fas fa-users-cog"></i></div>
                <span>الأفواج</span>
            </a>

            <a href="sessions.html" class="grid-item item-teal" id="btn-sessions">
                <div class="icon-wrap"><i class="fas fa-clipboard-check"></i></div>
                <span>تسجيل الحصص</span>
            </a>

            <a href="analytics.html" class="grid-item item-green" id="btn-analytics">
                <div class="icon-wrap"><i class="fas fa-chart-line"></i></div>
                <span>الإحصائيات</span>
            </a>

            <a href="salaries.html" class="grid-item item-red" id="btn-salaries">
                <div class="icon-wrap"><i class="fas fa-money-check-alt"></i></div>
                <span>رواتب الأساتذة</span>
            </a>

        </div>

    </div>

    <!-- Logout -->
    <button class="logout-btn" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i>
        تسجيل الخروج
    </button>

</div>

<script>
    function checkAccess() {
        const userRole = localStorage.getItem("kanashi_role");
        const userName = localStorage.getItem("kanashi_user_name") || "مستخدم النظام";

        if (!userRole) {
            window.location.href = "index.html";
            return;
        }

        document.getElementById("appContainer").style.display = "block";
        document.getElementById("welcomeText").innerText = userName;

        document.getElementById("liveDate").innerText = new Date().toLocaleDateString("ar-DZ", {
            weekday: "short", day: "numeric", month: "short"
        });

        const badgeSlot = document.getElementById("roleBadgeSlot");

        if (userRole === "manager") {
            badgeSlot.innerHTML = `<span class="role-badge badge-manager"><i class="fas fa-user-cog"></i> حساب مُسيّر</span>`;
            ["btn-analytics", "btn-salaries"].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add("locked");
                el.innerHTML += `<div class="lock-icon"><i class="fas fa-lock"></i></div>`;
            });
        } else {
            badgeSlot.innerHTML = `<span class="role-badge badge-admin"><i class="fas fa-user-shield"></i> المدير العام</span>`;
        }
    }

    function handleLogout() {
        if (!confirm("هل تريد تسجيل الخروج؟")) return;
        localStorage.removeItem("kanashi_role");
        localStorage.removeItem("kanashi_user_name");
        window.location.href = "index.html";
    }

    checkAccess();
</script>
</body>
</html>
